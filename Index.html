<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excercise Button</title>
    <style>
    .container{
        margin-top:50px;
        margin-left:40px;
    }
    h3{
        font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 32px;       
        
    }
    button{
        padding: 12px 30px;  
        border:none;    
        border-radius: 6px;
        color: white; 

        margin-left:20px;

        }

    .btn1{
        background-color: blue; 
    }
    
    .btn2{
        background-color: black;

    }

    .btn3{
        background-color: transparent;
        border: 5px;
        color: black;
        border: 1px solid black;
        border-radius: 50px;
    }

    .btn4{
        background-color: rgb(91, 23, 113);
        cursor: pointer;
        transition: all 0.3s;
    }

    .btn4:hover{
        background-color: rgb(177, 42, 222);
    }

    .btn5{
        background-color: brown;
        cursor:pointer;
        color: white;
        transition: all 0.3s;
    }

    .btn5:hover{
        background-color: transparent);
        color:blue;
        outline: 2px solid  blue;
    }

    .btn6{
        background-color: transparent;
        cursor:pointer;
        color: blue;
        border-radius: 50px;
        outline: 1px solid blue;
        transition: all 0.3s;
    }

    .btn6:hover{
        background-color: black;
        color: white;
        outline:none;


    }

    .btn7{
        background-color: black;
        cursor:pointer;
        transition: all 0.3s;
    }
    .btn7:hover{
        transform: scale(1.1);
        background-color: rgb(63, 59, 59);
    }

    .btn8{
        background-color: blue;
        cursor:pointer;
        transition: all 0.3s;
             
    }
    .btn8:hover{
        transform: rotate(10deg);  
        background-color: rgb(15, 15, 131);

    }

    .btn9{
        background-color: brown;
        cursor:pointer;
        transition: all 0.3s;
    }
    .btn9:hover{
        background-color: rgb(63, 32, 32);
        transform: scale(0.9);
    }
</style>
</head>

<body>

    <!-- group btn1 -->
    <div class=" container">
        <h3>Primary</h3>
        <button class="btn1">Primary-btn</button>
        <button class="btn2">Primary-btn</button>
        <button class="btn3">Primary-btn</button>
    </div>

    <!-- group btn2 -->
    <div class=" container">
        <h3>Primary</h3>
        <button class="btn4">Primary-btn</button>
        <button class="btn5">Primary-btn</button>
        <button class="btn6">Primary-btn</button>
    </div>

    <!-- GROUP btn3 -->
    <div class=" container">
        <h3>Primary</h3>
        <button class="btn7">Primary-btn</button>
        <button class="btn8">Primary-btn</button>
        <button class="btn9">Primary-btn</button>
    </div>
</body>
</html>
